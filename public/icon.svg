<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f7c66"/>
      <stop offset="100%" stop-color="#0a5a4a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b8941f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Mosque/dome silhouette -->
  <g transform="translate(256,256)">
    <!-- Dome -->
    <path d="M -90,30 Q -90,-40 0,-80 Q 90,-40 90,30 Z" fill="url(#gold)" opacity="0.95"/>
    <!-- Crescent -->
    <circle cx="0" cy="-100" r="14" fill="url(#gold)"/>
    <circle cx="6" cy="-100" r="12" fill="url(#bg)"/>
    <!-- Base -->
    <rect x="-100" y="30" width="200" height="14" rx="3" fill="url(#gold)"/>
    <!-- Minarets -->
    <rect x="-120" y="-20" width="14" height="64" rx="3" fill="url(#gold)"/>
    <rect x="106" y="-20" width="14" height="64" rx="3" fill="url(#gold)"/>
    <circle cx="-113" cy="-25" r="9" fill="url(#gold)"/>
    <circle cx="113" cy="-25" r="9" fill="url(#gold)"/>
    <!-- Door -->
    <path d="M -16,44 Q -16,18 0,18 Q 16,18 16,44 Z" fill="url(#bg)" opacity="0.7"/>
  </g>
</svg>
